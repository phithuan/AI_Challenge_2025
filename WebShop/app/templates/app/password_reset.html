{% extends 'app/base.html' %}
{% block Register %}
<div class="container my-5">
    <h3>Quên mật khẩu</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Nhập email" class="form-control mb-3">
        <button type="submit" class="btn btn-primary">Gửi email</button>
    </form>
</div>


{% endblock %}
