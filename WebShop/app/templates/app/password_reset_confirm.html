{% extends 'app/base.html' %}
{% block Register %}
<div class="container my-5">
    <h3>Đặt lại mật khẩu</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="new_password1" placeholder="Mật khẩu mới" class="form-control mb-3">
        <input type="password" name="new_password2" placeholder="Nhập lại mật khẩu" class="form-control mb-3">
        <button type="submit" class="btn btn-success">Xác nhận</button>
    </form>
</div>
{% endblock %}
